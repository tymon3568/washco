# Dev compose: APISIX gateway + infra only
# API and frontends run locally on the host
# APISIX runs in standalone yaml mode (no etcd needed)
services:
  apisix:
    image: apache/apisix:3.11.0-debian
    container_name: washco-apisix
    restart: unless-stopped
    ports:
      - "8888:9080"
    volumes:
      - ./infra/apisix/config.dev.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./infra/apisix/apisix.dev.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    extra_hosts:
      - "host.containers.internal:host-gateway"
    networks:
      - washco

  postgres:
    image: postgis/postgis:16-3.5
    container_name: washco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: washco
      POSTGRES_USER: washco
      POSTGRES_PASSWORD: washco
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U washco"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - washco

  keydb:
    image: eqalpha/keydb:latest
    container_name: washco-keydb
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - keydb_data:/data
    networks:
      - washco

volumes:
  postgres_data:
  keydb_data:

networks:
  washco:
    driver: bridge
