name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Cargo check
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  frontend-check:
    name: Frontend Check (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [owner, driver]
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: frontend/${{ matrix.app }}
        run: bun install

      - name: Check (svelte-check + typescript)
        working-directory: frontend/${{ matrix.app }}
        run: bun run check

      - name: Build
        working-directory: frontend/${{ matrix.app }}
        run: bun run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rust-check, frontend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API container
        run: podman build -f infra/podman/Containerfile.api -t washco-api .

      - name: Build Owner container
        run: podman build -f infra/podman/Containerfile.owner -t washco-owner frontend/owner

      - name: Build Driver container
        run: podman build -f infra/podman/Containerfile.driver -t washco-driver frontend/driver
