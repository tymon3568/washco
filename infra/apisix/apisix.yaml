# APISIX declarative routes (standalone mode)
# Port 9080 (-> 8088): Owner Dashboard + API
# Port 9081 (-> 8089): Driver App + API

routes:
  # ============================================================
  # OWNER DASHBOARD (port 9080 -> localhost:8088)
  # ============================================================
  - id: 1
    uri: /*
    priority: -1
    vars:
      - - server_port
        - "=="
        - "9080"
    upstream:
      type: roundrobin
      nodes:
        host.containers.internal:5173: 1
    plugins:
      cors:
        allow_origins: "http://localhost:8088"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Content-Type,Authorization"
        allow_credential: true

  # ============================================================
  # DRIVER APP (port 9081 -> localhost:8089)
  # ============================================================
  - id: 6
    uri: /*
    priority: -1
    vars:
      - - server_port
        - "=="
        - "9081"
    upstream:
      type: roundrobin
      nodes:
        host.containers.internal:3001: 1
    plugins:
      cors:
        allow_origins: "http://localhost:8089"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Content-Type,Authorization"
        allow_credential: true

  # ============================================================
  # API ROUTES (available on both ports)
  # ============================================================
  - id: 2
    uri: /api/v1/*
    upstream:
      type: roundrobin
      nodes:
        host.containers.internal:8080: 1
    plugins:
      cors:
        allow_origins: "http://localhost:8088,http://localhost:8089"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Content-Type,Authorization"
        allow_credential: true
      limit-req:
        rate: 100
        burst: 50
        key_type: "var"
        key: "remote_addr"
        rejected_code: 429

  # WebSocket routes
  - id: 3
    uri: /api/v1/queue/ws/*
    upstream:
      type: roundrobin
      nodes:
        host.containers.internal:8080: 1
    enable_websocket: true

  # Health check passthrough
  - id: 8
    uri: /health
    upstream:
      type: roundrobin
      nodes:
        host.containers.internal:8080: 1

#END
