apisix:
  node_listen: 9080
  enable_admin: true
  admin_key:
    - name: admin
      key: washco-apisix-admin-key
      role: admin

deployment:
  role: traditional
  role_traditional:
    config_provider: etcd
  admin:
    admin_listen:
      port: 9180
  etcd:
    host:
      - "http://etcd:2379"
    prefix: "/apisix"

plugin_attr:
  prometheus:
    export_addr:
      ip: 0.0.0.0
      port: 9091
