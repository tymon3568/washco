# APISIX routes for dev mode
# Routes to host machine where API and frontends run locally

routes:
  # API routes via localhost:8888/api/v1/*
  - id: 1
    uri: /api/v1/*
    upstream:
      type: roundrobin
      nodes:
        host.containers.internal:8080: 1
    plugins:
      cors:
        allow_origins: "http://localhost:8888,http://localhost:5173,http://localhost:5174"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "Content-Type,Authorization"
        allow_credential: true
      limit-req:
        rate: 100
        burst: 50
        key_type: "var"
        key: "remote_addr"
        rejected_code: 429

  # WebSocket
  - id: 2
    uri: /api/v1/queue/ws/*
    priority: 10
    upstream:
      type: roundrobin
      nodes:
        host.containers.internal:8080: 1
    enable_websocket: true

  # Driver app via /driver/* prefix (dev convenience)
  - id: 4
    uri: /driver/*
    upstream:
      type: roundrobin
      nodes:
        host.containers.internal:5174: 1
    plugins:
      proxy-rewrite:
        regex_uri: ["^/driver/(.*)", "/$1"]

  # Owner dashboard (default catch-all)
  - id: 3
    uri: /*
    priority: -1
    upstream:
      type: roundrobin
      nodes:
        host.containers.internal:5173: 1

#END
