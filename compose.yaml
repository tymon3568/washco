services:
  # ============================================================
  # API GATEWAY
  # ============================================================
  apisix:
    image: apache/apisix:3.11.0-debian
    container_name: washco-apisix
    restart: unless-stopped
    ports:
      - "8088:9080"
      - "8443:9443"
    volumes:
      - ./infra/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./infra/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    networks:
      - washco

  apisix-dashboard:
    image: apache/apisix-dashboard:3.0.1-alpine
    container_name: washco-apisix-dashboard
    restart: unless-stopped
    ports:
      - "9090:9000"
    volumes:
      - ./infra/apisix/dashboard.yaml:/usr/local/apisix-dashboard/conf/conf.yaml:ro
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - washco

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: washco-etcd
    restart: unless-stopped
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - etcd_data:/etcd-data
    networks:
      - washco

  # ============================================================
  # APPLICATION
  # ============================================================
  washco-api:
    build:
      context: .
      dockerfile: infra/podman/Containerfile.api
    container_name: washco-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://washco:${POSTGRES_PASSWORD:-washco}@postgres:5432/washco
      REDIS_URL: redis://keydb:6379
      S3_ENDPOINT: http://rustfs:9000
      S3_BUCKET: ${S3_BUCKET:-washco}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-washco}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-washco-secret}
      S3_REGION: ${S3_REGION:-us-east-1}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      HOST: 0.0.0.0
      PORT: 8080
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-50}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:3001}
      RUST_LOG: ${RUST_LOG:-washco=info,tower_http=info}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      keydb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - washco

  washco-outbox:
    build:
      context: .
      dockerfile: infra/podman/Containerfile.api
    container_name: washco-outbox
    restart: unless-stopped
    command: ["washco-server", "--outbox"]
    environment:
      DATABASE_URL: postgres://washco:${POSTGRES_PASSWORD:-washco}@postgres:5432/washco
      REDIS_URL: redis://keydb:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DB_MAX_CONNECTIONS: 5
      RUST_LOG: ${RUST_LOG:-washco=info}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - washco

  owner-dashboard:
    build:
      context: ./frontend/owner
      dockerfile: ../../infra/podman/Containerfile.owner
    container_name: washco-owner-dashboard
    restart: unless-stopped
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      ORIGIN: ${OWNER_ORIGIN:-http://localhost}
      PUBLIC_API_URL: /api/v1
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - washco

  driver-app:
    build:
      context: ./frontend/driver
      dockerfile: ../../infra/podman/Containerfile.driver
    container_name: washco-driver-app
    restart: unless-stopped
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      ORIGIN: ${DRIVER_ORIGIN:-http://localhost}
      PUBLIC_API_URL: /api/v1
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - washco

  # ============================================================
  # DATA STORES
  # ============================================================
  postgres:
    image: postgis/postgis:16-3.5
    container_name: washco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: washco
      POSTGRES_USER: washco
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-washco}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U washco"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    networks:
      - washco

  keydb:
    image: eqalpha/keydb:latest
    container_name: washco-keydb
    restart: unless-stopped
    command: keydb-server --save 60 1000 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - keydb_data:/data
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
    networks:
      - washco

  rustfs:
    image: rustfs/rustfs:latest
    container_name: washco-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:-washco}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:-washco-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - rustfs_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - washco

volumes:
  postgres_data:
  keydb_data:
  rustfs_data:
  etcd_data:

networks:
  washco:
    driver: bridge
