services:
  # ============================================================
  # API GATEWAY
  # ============================================================
  apisix:
    image: apache/apisix:3.11.0-debian
    container_name: washco-apisix
    restart: unless-stopped
    ports:
      - "80:9080"
      - "443:9443"
    volumes:
      - ./infra/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./infra/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - washco

  apisix-dashboard:
    image: apache/apisix-dashboard:3.0.1-alpine
    container_name: washco-apisix-dashboard
    restart: unless-stopped
    ports:
      - "9090:9000"
    volumes:
      - ./infra/apisix/dashboard.yaml:/usr/local/apisix-dashboard/conf/conf.yaml:ro
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - washco

  etcd:
    image: bitnami/etcd:3.5
    container_name: washco-etcd
    restart: unless-stopped
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - etcd_data:/bitnami/etcd
    networks:
      - washco

  # ============================================================
  # APPLICATION
  # ============================================================
  washco-api:
    build:
      context: .
      dockerfile: infra/podman/Containerfile.api
    container_name: washco-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://washco:washco@postgres:5432/washco
      REDIS_URL: redis://keydb:6379
      S3_ENDPOINT: http://rustfs:9000
      S3_BUCKET: washco
      S3_ACCESS_KEY: washco
      S3_SECRET_KEY: washco-secret
      S3_REGION: us-east-1
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: washco=debug,tower_http=debug
    depends_on:
      postgres:
        condition: service_healthy
      keydb:
        condition: service_started
    networks:
      - washco

  washco-outbox:
    build:
      context: .
      dockerfile: infra/podman/Containerfile.api
    container_name: washco-outbox
    restart: unless-stopped
    command: ["./washco-server", "--outbox"]
    environment:
      DATABASE_URL: postgres://washco:washco@postgres:5432/washco
      REDIS_URL: redis://keydb:6379
      RUST_LOG: washco=info
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - washco

  owner-dashboard:
    build:
      context: ./frontend/owner
      dockerfile: ../../infra/podman/Containerfile.owner
    container_name: washco-owner-dashboard
    restart: unless-stopped
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      ORIGIN: http://localhost
      PUBLIC_API_URL: /api/v1
    networks:
      - washco

  # ============================================================
  # DATA STORES
  # ============================================================
  postgres:
    image: postgis/postgis:16-3.5
    container_name: washco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: washco
      POSTGRES_USER: washco
      POSTGRES_PASSWORD: washco
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U washco"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - washco

  keydb:
    image: eqalpha/keydb:latest
    container_name: washco-keydb
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - keydb_data:/data
    networks:
      - washco

  rustfs:
    image: ghcr.io/topdata-software-gmbh/rustfs:latest
    container_name: washco-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ROOT_USER: washco
      RUSTFS_ROOT_PASSWORD: washco-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - rustfs_data:/data
    networks:
      - washco

volumes:
  postgres_data:
  keydb_data:
  rustfs_data:
  etcd_data:

networks:
  washco:
    driver: bridge
